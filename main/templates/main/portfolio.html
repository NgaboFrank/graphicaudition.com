{% extends 'main/base.html' %}{% load static %}
{% block content %}
<section class="page-hero patterned-section">
  <div class="container">
    <p class="section-kicker">&lt;&gt; our portfolio &lt;/&gt;</p>
    <h1 class="page-title">Our Portfolio</h1>
    <p class="page-sub">A selection of campaigns, flyers, social media designs, and brand visuals by Graphic Audition.</p>
  </div>
</section>
<section class="portfolio-page patterned-section">
  <div class="container">
    <div class="portfolio-masonry">
      {% for item in portfolio %}
      <article class="masonry-card reveal">
        <img src="{% static item.image %}" alt="{{ item.name }}">
        <div class="masonry-copy">
          <h3>{{ item.name }}</h3>
          <p>{{ item.desc }}</p>
        </div>
      </article>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
